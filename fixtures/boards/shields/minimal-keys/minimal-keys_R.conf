CONFIG_ZMK_KEYBOARD_NAME="minimal-keys"

CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y

CONFIG_SPI=y
CONFIG_INPUT=y

CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=1650
# CONFIG_PMW3610_X_SCALE=130         # undefined in current driver revision
# CONFIG_PMW3610_Y_SCALE=160         # undefined in current driver revision
CONFIG_PMW3610_CPI_DIVIDOR=1
CONFIG_PMW3610_ORIENTATION_180=n
CONFIG_PMW3610_SCROLL_TICK=32
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_SCROLL_X=y
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20
#CONFIG_PMW3610_FORCE_AWAKE=y
CONFIG_PMW3610_POLLING_RATE_250=y
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=60000

CONFIG_PMW3610_SMART_ALGORITHM=y
# CONFIG_PMW3610_ADJUSTABLE_MOUSESPEED=n  # undefined in current driver revision
# CONFIG_PMW3610_MOVEMENT_THRESHOLD=8     # undefined in current driver revision

CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Wireless Config Service
CONFIG_WIRELESS_CONFIG=y
CONFIG_WIRELESS_CONFIG_NOTIFY_KEY_EVENTS=y
CONFIG_WIRELESS_CONFIG_PERSIST_SETTINGS=y
CONFIG_SETTINGS=y

# BLE MTU — allow large GATT notifications (keymap=87B, combos=224B)
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_TX_COUNT=3
